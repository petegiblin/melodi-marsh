<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Melodi Marsh</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" href="favicon.ico" sizes="any" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&display=swap');

  :root{
    --bg:#ffffff;
    --ink:#0c0c0c;
    --gap:30px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);}
  body{
    font-family:'Karla',-apple-system,sans-serif;
    font-size:12px;
    letter-spacing:0.06em;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- NAV ---------- */
  header{
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px;
    mix-blend-mode:difference;
    color:#fff; z-index:100;
    text-transform:uppercase;
  }
  .brand{ font-weight:500; font-size:13px; letter-spacing:0.04em; }
  .brand a{ color:inherit; text-decoration:none; }
  nav{ display:flex; gap:22px; }
  nav a{ color:inherit; text-decoration:none; font-size:11px; letter-spacing:0.1em; transition:opacity .2s; }
  nav a:hover{ opacity:0.5; }

  /* ---------- HERO / LEAD IMAGE ----------
     Full-viewport portrait that greets the visitor (à la Crowns & Owls) and
     covers the brief moment while the feed below fetches. */
  .hero{
    width:100%;
    height:100svh;
    min-height:540px;
    overflow:hidden;
    background:#e7e4df;
  }
  .hero img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:50% 30%;   /* keep her face in frame when cropped wide */
    display:block;
  }

  /* ---------- MASONRY WALL ----------
     CSS columns give the uneven, flowing wall C&O has. Tiles keep their
     NATIVE aspect ratio (set per-tile from the post's real dimensions),
     so nothing is square-cropped. */
  .feed{ padding:0; }
  .wall{
    column-count:3;
    column-gap:3vw;
    padding:var(--gap) 3.5vw 0;
  }
  @media(max-width:1080px){ .wall{ column-count:2; column-gap:4vw; } }
  @media(max-width:680px){ .wall{ column-count:1; column-gap:0; padding:var(--gap) 22px 0; } }

  .tile{
    position:relative;
    display:block;
    break-inside:avoid;
    width:100%;
    margin:0 0 3.5vh;
    overflow:hidden;
    background:#e7e4df;              /* swapped for the post's dominant colour via JS */
    text-decoration:none;
    color:#fff;
  }
  /* Loose gallery hang: vary each tile's width + nudge its alignment so the wall
     reads as an organic, varying-size arrangement rather than a rigid grid. */
  .tile:nth-of-type(6n+1){ width:100%; }
  .tile:nth-of-type(6n+2){ width:70%; margin-left:auto; }
  .tile:nth-of-type(6n+3){ width:86%; }
  .tile:nth-of-type(6n+4){ width:62%; }
  .tile:nth-of-type(6n+5){ width:92%; margin-left:auto; }
  .tile:nth-of-type(6n+6){ width:78%; }
  @media(max-width:760px){
    .wall .tile{ width:88% !important; margin:0 auto 7vh !important; }
  }
  .tile .tilemedia{
    width:100%; height:100%; display:block;
    object-fit:cover;
    background:transparent;
    opacity:0;
    filter:grayscale(14%);
    transition:opacity .7s ease, transform .65s ease, filter .65s ease;
  }
  .tile .tilemedia.loaded{ opacity:1; }
  .tile:hover .tilemedia{ transform:scale(1.035); filter:grayscale(0%); }

  /* reel / video marker */
  .tile .play{
    position:absolute; top:11px; right:11px;
    width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:8px; color:#fff; padding-left:2px;
    background:rgba(0,0,0,0.32);
    -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);
    opacity:0.7; transition:opacity .3s;
  }
  .tile:hover .play{ opacity:0.95; }

  /* hover-reveal caption */
  .tile .title{
    position:absolute; left:0; right:0; bottom:0;
    padding:16px 14px 13px;
    color:#fff;
    text-transform:uppercase;
    font-size:10px; letter-spacing:0.11em; line-height:1.55;
    opacity:0; transform:translateY(6px);
    transition:opacity .28s, transform .28s;
    background:linear-gradient(transparent, rgba(0,0,0,0.66));
  }
  .tile:hover .title{ opacity:1; transform:translateY(0); }

  .feed-error{
    padding:90px 16px; text-align:center; color:#999;
    text-transform:uppercase; letter-spacing:0.12em; font-size:11px;
  }
  .feed-error a{ color:var(--ink); border-bottom:1px solid var(--ink); text-decoration:none; }

  /* ---------- LIGHTBOX (view / play a post on the site) ---------- */
  body.lb-open{ overflow:hidden; }
  .lb{
    position:fixed; inset:0; z-index:1000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:6vh 4vw;
    background:rgba(8,8,8,0.95);
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  }
  .lb[hidden]{ display:none; }
  .lb-stage{ display:flex; align-items:center; justify-content:center; max-width:92vw; max-height:76vh; }
  .lb-stage img, .lb-stage video{
    max-width:92vw; max-height:76vh; width:auto; height:auto; display:block;
    box-shadow:0 12px 64px rgba(0,0,0,0.55);
  }
  .lb-close{
    position:absolute; top:16px; right:20px;
    background:none; border:0; color:#fff; font-size:22px; line-height:1;
    cursor:pointer; opacity:0.75; transition:opacity .2s;
  }
  .lb-close:hover{ opacity:1; }
  .lb-meta{ max-width:640px; text-align:center; color:#e8e8e8; }
  .lb-cap{ font-size:13px; line-height:1.65; letter-spacing:0.02em; margin-bottom:12px; }
  .lb-ig{ color:#aaa; text-transform:uppercase; font-size:10px; letter-spacing:0.14em; text-decoration:none; border-bottom:1px solid #555; }
  .lb-ig:hover{ color:#fff; }

  /* ---------- INFO STRIP ---------- */
  .info{
    display:flex; flex-wrap:wrap; gap:30px;
    padding:60px 16px;
    text-transform:uppercase; font-size:11px; letter-spacing:0.1em;
    border-top:1px solid rgba(0,0,0,0.08);
    margin-top:var(--gap);
  }
  .info div{ max-width:340px; line-height:1.9; }
  .info h3{ font-size:11px; letter-spacing:0.16em; margin-bottom:10px; color:#999; }
  .info .about{ max-width:440px; }
  .info .bio{ text-transform:none; font-size:12.5px; letter-spacing:0.01em; line-height:1.75; color:var(--ink); }
  .info .bio + .bio{ margin-top:0.9em; }
  .info a{ color:var(--ink); text-decoration:none; border-bottom:1px solid var(--ink); }

  footer{
    display:flex; justify-content:space-between;
    padding:18px 16px;
    text-transform:uppercase; font-size:10px; letter-spacing:0.12em; color:#999;
  }
  footer a{ color:inherit; text-decoration:none; }
  footer a:hover{ color:var(--ink); }
</style>
</head>
<body>

<header>
  <div class="brand"><a href="index.html">Melodi Marsh</a></div>
  <nav>
    <a href="info.html">Info</a>
    <a href="https://www.instagram.com/melodi.marsh/" target="_blank" rel="noopener">Instagram</a>
  </nav>
</header>

<main>
  <section class="hero">
    <img src="hero.jpg" alt="Melodi Marsh" />
  </section>

  <section class="feed">
    <!-- Live Instagram wall: data pulled from Behold's feed API, rendered as a
         native-aspect-ratio masonry (see script at end of body). -->
    <div id="wall" class="wall" aria-busy="true"></div>
  </section>

</main>

<footer>
  <span>© Melodi Marsh 2026</span>
  <a href="https://www.instagram.com/melodi.marsh/" target="_blank" rel="noopener">@melodi.marsh</a>
</footer>

<div id="lightbox" class="lb" hidden>
  <button class="lb-close" aria-label="Close">✕</button>
  <div class="lb-stage"></div>
  <div class="lb-meta">
    <p class="lb-cap"></p>
    <a class="lb-ig" target="_blank" rel="noopener">View on Instagram ↗</a>
  </div>
</div>

<script>
(function () {
  var BEHOLD = "https://feeds.behold.so/0uNWfXV0shwITWAByBnL";
  var wall = document.getElementById('wall');

  // Prefer our self-hosted full feed (feed.json, built from Instagram's API by
  // the GitHub Action in .github/). Fall back to Behold's live feed (free tier
  // = 6 posts) whenever feed.json isn't there yet, so the wall never breaks.
  // Both sources are mapped to one normalised post shape before rendering.
  fetch('feed.json', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw 0; return r.json(); })
    .then(function (posts) { if (!Array.isArray(posts) || !posts.length) throw 0; return posts; })
    .catch(function () {
      return fetch(BEHOLD)
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(beholdToPosts);
    })
    .then(render)
    .catch(showError);

  // Map Behold's payload to our normalised shape (used only for the fallback).
  function beholdToPosts(data) {
    return ((data && data.posts) || []).map(function (p) {
      var large = (p.sizes && p.sizes.large) || {};
      var dims  = large.uncropped || {};
      var isVid = p.mediaType === 'VIDEO' || p.isReel;
      return {
        image:     isVid ? (p.thumbnailUrl || large.mediaUrl) : (p.mediaUrl || large.mediaUrl),
        video:     isVid ? (p.mediaUrl || null) : null,
        fallback:  large.mediaUrl || null,      // Behold's never-expiring cached copy
        permalink: p.permalink || null,
        caption:   p.prunedCaption || '',
        isVideo:   !!isVid,
        width:     dims.width || null,
        height:    dims.height || null,
        color:     (p.colorPalette && p.colorPalette.dominant) || null
      };
    });
  }

  // Silent autoplay for videos that are on-screen (keeps a 100+ post wall light).
  var wallVideos = [];
  function playVid(v) {
    var p = v.play();
    if (p && p.then) p.then(null, function () {
      // early play() can be aborted by the in-flight load — retry once it's ready
      setTimeout(function () { var q = v.play(); if (q && q.catch) q.catch(function () {}); }, 250);
    });
  }
  function syncVideos() {
    var vh = window.innerHeight || document.documentElement.clientHeight;
    for (var i = 0; i < wallVideos.length; i++) {
      var v = wallVideos[i], r = v.getBoundingClientRect();
      if (r.height > 0 && r.bottom > -250 && r.top < vh + 250) {
        if (!v.dataset.armed) {
          v.dataset.armed = '1';
          v.poster = v.dataset.poster;
          v.src = v.dataset.src;
          v.addEventListener('canplay', function () { playVid(this); }, { once: true });
          v.load();
        } else if (v.paused) {
          playVid(v);
        }
      } else if (!v.paused) {
        v.pause();
      }
    }
  }
  var vTicking = false;
  function onScrollResize() { if (!vTicking) { vTicking = true; requestAnimationFrame(function () { vTicking = false; syncVideos(); }); } }
  window.addEventListener('scroll', onScrollResize, { passive: true });
  window.addEventListener('resize', onScrollResize);

  // Normalised post: { image, video?, fallback?, permalink, caption, isVideo, width?, height?, color? }
  function render(posts) {
    // Drop near-black auto-covers when we know the colour (keeps holes out of
    // the wall); never filter below 3 tiles.
    var visible = posts.filter(function (p) { return !p.color || luma(p.color) >= 22; });
    if (visible.length < 3) visible = posts;
    if (!visible.length) return showError();

    var frag = document.createDocumentFragment();
    visible.forEach(function (p) {
      var a = document.createElement('a');
      a.className = 'tile' + (p.isVideo ? ' is-video' : '');
      a.href = p.permalink || 'https://www.instagram.com/melodi.marsh/';
      a.rel = 'noopener';
      a.style.aspectRatio = (p.width && p.height) ? (p.width + ' / ' + p.height) : '4 / 5';
      a.style.background = p.color ? ('rgb(' + p.color + ')') : '#e7e4df';
      a.addEventListener('click', function (ev) { ev.preventDefault(); openLightbox(p); });

      if (p.isVideo && p.video) {
        var v = document.createElement('video');
        v.className = 'tilemedia';
        v.muted = true; v.loop = true; v.playsInline = true; v.preload = 'none';
        v.setAttribute('muted', ''); v.setAttribute('playsinline', '');
        v.dataset.poster = p.image; v.dataset.src = p.video;
        v.addEventListener('playing', function () { v.classList.add('loaded'); });
        a.appendChild(v);
        wallVideos.push(v);
      } else {
        var img = new Image();
        img.className = 'tilemedia';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.referrerPolicy = 'no-referrer';
        img.alt = (p.caption || 'Melodi Marsh').slice(0, 80);
        img.onload = function () { img.classList.add('loaded'); };
        img.onerror = function () {
          if (p.fallback && img.src.indexOf(p.fallback) === -1) { img.src = p.fallback; }
          else { img.classList.add('loaded'); }
        };
        img.src = p.image;
        a.appendChild(img);
      }

      if (p.isVideo) {
        var play = document.createElement('span');
        play.className = 'play';
        play.textContent = '▶';
        a.appendChild(play);
      }
      var cap = (p.caption || '').trim();
      if (cap) {
        var t = document.createElement('span');
        t.className = 'title';
        t.textContent = cap.length > 72 ? cap.slice(0, 72).trim() + '…' : cap;
        a.appendChild(t);
      }
      frag.appendChild(a);
    });
    wall.appendChild(frag);
    wall.removeAttribute('aria-busy');
    syncVideos();
  }

  // ---- lightbox: view / play a post on the site (no Instagram detour) ----
  var lb = document.getElementById('lightbox');
  var lbStage = lb.querySelector('.lb-stage');
  var lbCap = lb.querySelector('.lb-cap');
  var lbIg = lb.querySelector('.lb-ig');

  function openLightbox(p) {
    lbStage.innerHTML = '';
    if (p.isVideo && p.video) {
      var v = document.createElement('video');
      v.src = p.video; v.poster = p.image;
      v.controls = true; v.autoplay = true; v.loop = true; v.playsInline = true;
      v.setAttribute('playsinline', '');
      lbStage.appendChild(v);
    } else {
      var im = document.createElement('img');
      im.src = p.image; im.alt = (p.caption || 'Melodi Marsh');
      lbStage.appendChild(im);
    }
    lbCap.textContent = (p.caption || '').trim();
    lbIg.href = p.permalink || 'https://www.instagram.com/melodi.marsh/';
    document.body.classList.add('lb-open');
    lb.hidden = false;
    [].forEach.call(document.querySelectorAll('.wall video'), function (vv) { vv.pause(); });
  }
  function closeLightbox() {
    lb.hidden = true;
    document.body.classList.remove('lb-open');
    lbStage.innerHTML = '';   // stops/unloads the lightbox video
  }
  lb.querySelector('.lb-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', function (e) { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !lb.hidden) closeLightbox(); });

  function luma(c) {
    var d = String(c).split(',').map(Number);
    return 0.299 * d[0] + 0.587 * d[1] + 0.114 * d[2];
  }

  function showError() {
    wall.removeAttribute('aria-busy');
    wall.className = '';
    wall.innerHTML = '<p class="feed-error">Feed momentarily unavailable — ' +
      '<a href="https://www.instagram.com/melodi.marsh/" target="_blank" rel="noopener">view on Instagram</a></p>';
  }
})();
</script>

</body>
</html>
